<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Meetwoyou — Sign In</title>
<meta name="description" content="Meetwoyou — Connect with the world instantly.">
<link rel="manifest" href="./site.webmanifest">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<link rel="shortcut icon" href="./favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<!-- Speed: preconnect to every third-party origin used on boot -->
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firebaseinstallations.googleapis.com" crossorigin>
<link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://api.cloudinary.com">
<link rel="dns-prefetch" href="https://ipapi.co">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js">
<link rel="preload" as="image" href="./web-app-manifest-192x192.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0f172a;color:#fff;font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  body{display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
  .bg-anim{position:fixed;inset:0;z-index:-2;background:radial-gradient(1200px 800px at 20% 20%,#1e293b 0%,transparent 60%),radial-gradient(900px 700px at 80% 80%,#1e1b4b 0%,transparent 60%),#0f172a}
  .bg-anim::after{content:"";position:absolute;inset:0;background:radial-gradient(2px 2px at 20% 30%,rgba(139,92,246,.4),transparent),radial-gradient(2px 2px at 70% 60%,rgba(59,130,246,.3),transparent),radial-gradient(2px 2px at 50% 80%,rgba(236,72,153,.3),transparent);background-size:200px 200px;animation:drift 20s linear infinite}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(-100px,-50px)}}
  #boot{position:fixed;inset:0;background:#0f172a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s}
  #boot.hide{opacity:0;pointer-events:none}
  #boot img{width:88px;height:88px;border-radius:22px;box-shadow:0 20px 50px rgba(124,58,237,.35);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  #boot .ring{margin-top:24px;width:34px;height:34px;border-radius:50%;border:3px solid #1e293b;border-top-color:#7c3aed;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .card{position:relative;width:100%;max-width:420px;padding:36px 28px;border-radius:28px;background:rgba(255,255,255,.04);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.08);box-shadow:0 30px 60px -20px rgba(0,0,0,.6);animation:rise .6s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .glow{position:absolute;width:200px;height:200px;border-radius:50%;filter:blur(60px);opacity:.4;pointer-events:none}
  .g1{background:#7c3aed;top:-60px;left:-60px}
  .g2{background:#3b82f6;bottom:-60px;right:-60px}
  h1{font-size:38px;font-weight:800;letter-spacing:-1.5px;margin:0 0 4px;background:linear-gradient(90deg,#fff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
  .tag{text-align:center;color:#94a3b8;font-size:13px;margin:0 0 28px}
  .field{position:relative;margin-bottom:14px}
  .field input{width:100%;padding:16px 18px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;outline:none;transition:.2s}
  .field input:focus{border-color:#8b5cf6;background:rgba(139,92,246,.06);box-shadow:0 0 0 4px rgba(139,92,246,.15)}
  .field .eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#94a3b8;cursor:pointer;padding:4px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{width:100%;padding:15px;border:none;border-radius:16px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;box-shadow:0 10px 30px -10px rgba(124,58,237,.6)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 40px -10px rgba(124,58,237,.8)}
  .btn-primary:active{transform:translateY(0)}
  .btn-ghost{background:rgba(255,255,255,.04);color:#fff;border:1px solid rgba(255,255,255,.08)}
  .btn-ghost:hover{background:rgba(255,255,255,.08)}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#475569;font-size:11px;font-weight:800;letter-spacing:2px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08)}
  .switch{text-align:center;margin-top:24px;color:#94a3b8;font-size:14px}
  .switch button{background:none;border:none;color:#a78bfa;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
  .switch button:hover{color:#c4b5fd}
  .forgot{text-align:right;margin:-4px 0 14px}
  .forgot button{background:none;border:none;color:#a78bfa;font-size:12px;cursor:pointer;font-family:inherit}
  .hidden{display:none!important}
  .legal{margin-top:22px;text-align:center;font-size:11px;color:#64748b}
  .legal a{color:#94a3b8;text-decoration:none;margin:0 6px}
  .legal a:hover{color:#fff}
  #pwa{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:12px;background:rgba(30,41,59,.95);backdrop-filter:blur(15px);padding:10px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 40px rgba(0,0,0,.5);z-index:10000;width:92%;max-width:340px;animation:slideDown .5s cubic-bezier(.175,.885,.32,1.275)}
  @keyframes slideDown{from{top:-100px;opacity:0}to{top:20px;opacity:1}}
  #pwa img{width:38px;height:38px;border-radius:10px}
  #pwa button{background:#7c3aed;color:#fff;border:none;padding:7px 14px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer}
  @media (max-width:380px){h1{font-size:32px}.card{padding:28px 20px}}
</style>
</head>
<body>
<div id="boot"><img src="./web-app-manifest-192x192.png" alt="Meetwoyou"><div class="ring"></div></div>
<div class="bg-anim"></div>

<div id="auth-card" class="card hidden">
  <div class="glow g1"></div><div class="glow g2"></div>

  <h1>Meetwoyou</h1>
  <p class="tag">Connect with the world instantly.</p>

  <div id="login-section">
    <div class="field"><input type="email" id="login-email" placeholder="Email address" autocomplete="email"></div>
    <div class="field">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <i class="fas fa-eye eye" onclick="togglePass('login-password',this)"></i>
    </div>
    <div class="forgot"><button onclick="showSection('forgot-section')">Forgot password?</button></div>
    <button id="login-btn" class="btn btn-primary">Sign In</button>
    <div class="divider">OR</div>
    <button id="google-login" class="btn btn-ghost">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.94l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="switch">No account yet? <button onclick="showSection('signup-section')">Create account</button></div>
  </div>

  <div id="signup-section" class="hidden">
    <div class="row2">
      <div class="field"><input type="text" id="signup-first-name" placeholder="First name"></div>
      <div class="field"><input type="text" id="signup-last-name" placeholder="Last name"></div>
    </div>
    <div class="field"><input type="email" id="signup-email" placeholder="Email address" autocomplete="email"></div>
    <div class="field">
      <input type="password" id="signup-password" placeholder="Create password (min 6)" autocomplete="new-password">
      <i class="fas fa-eye eye" onclick="togglePass('signup-password',this)"></i>
    </div>
    <button id="signup-btn" class="btn btn-primary" style="margin-top:8px">Join Meetwoyou</button>
    <p class="legal" style="margin-top:14px">By signing up you agree to our<br><a href="./terms.html">Terms</a>·<a href="./privacy.html">Privacy</a></p>
    <div class="switch"><button onclick="showSection('login-section')">← Back to sign in</button></div>
  </div>

  <div id="forgot-section" class="hidden">
    <h3 style="text-align:center;margin:0 0 6px">Reset password</h3>
    <p class="tag">We'll email you a recovery link.</p>
    <div class="field"><input type="email" id="forgot-email" placeholder="Your email"></div>
    <button id="reset-btn" class="btn btn-primary">Send link</button>
    <div class="switch"><button onclick="showSection('login-section')">← Back to sign in</button></div>
  </div>

  <p class="legal"><a href="./about.html">About</a>·<a href="./terms.html">Terms</a>·<a href="./privacy.html">Privacy</a>·<a href="./messenger.html">Messenger</a></p>
</div>

<!-- Minimal toast (lazy SweetAlert) -->
<div id="toast" style="display:none;position:fixed;top:24px;right:24px;background:rgba(30,41,59,.96);color:#fff;padding:12px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.08);z-index:99998;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:300px"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updateProfile, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBn3x2qSo8k6a9wrxNfLmVliWMmsUk8wfY",
  authDomain: "meetwoyou-436a2.firebaseapp.com",
  projectId: "meetwoyou-436a2",
  storageBucket: "meetwoyou-436a2.firebasestorage.app",
  messagingSenderId: "612788132077",
  appId: "1:612788132077:web:0a8b92edf26778efd4d4e4"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const adminEmail = "admin@meetwoyou.com";

const toast = (msg, kind='ok') => {
  const t = document.getElementById('toast');
  t.style.borderLeft = '4px solid ' + (kind==='err'?'#ef4444':kind==='warn'?'#f59e0b':'#22c55e');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(()=>t.style.display='none', 3200);
};

const goNext = email => location.replace(email.toLowerCase()===adminEmail ? 'admin.html' : 'dashboard.html');

onAuthStateChanged(auth, user => {
  if (user) { goNext(user.email); return; }
  document.getElementById('boot').classList.add('hide');
  document.getElementById('auth-card').classList.remove('hidden');
});

window.togglePass = (id, ic) => {
  const el = document.getElementById(id);
  el.type = el.type==='password' ? 'text' : 'password';
  ic.classList.toggle('fa-eye'); ic.classList.toggle('fa-eye-slash');
};
window.showSection = id => {
  ['login-section','signup-section','forgot-section'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
};

document.getElementById('reset-btn').onclick = async () => {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return toast('Enter your email','err');
  try { await sendPasswordResetEmail(auth, email); toast('Recovery link sent'); showSection('login-section'); }
  catch (e) { toast(e.message,'err'); }
};

document.getElementById('signup-btn').onclick = async () => {
  const fn = document.getElementById('signup-first-name').value.trim();
  const ln = document.getElementById('signup-last-name').value.trim();
  const em = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-password').value;
  if (!fn||!em||!pw) return toast('All fields required','err');
  if (pw.length<6) return toast('Password ≥ 6 chars','err');
  try {
    await setPersistence(auth, browserLocalPersistence);
    const res = await createUserWithEmailAndPassword(auth, em, pw);
    await updateProfile(res.user, { displayName: `${fn} ${ln}`.trim() });
    toast('Welcome ' + fn);
  } catch (e) { toast(e.message.replace('Firebase: ',''),'err'); }
};

document.getElementById('login-btn').onclick = async () => {
  const em = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  if (!em||!pw) return toast('Fill all fields','err');
  try { await setPersistence(auth, browserLocalPersistence); await signInWithEmailAndPassword(auth, em, pw); }
  catch (e) { toast('Invalid email or password','err'); }
};

document.getElementById('google-login').onclick = async () => {
  try { await setPersistence(auth, browserLocalPersistence); await signInWithPopup(auth, provider); }
  catch (e) { toast('Google sign-in failed','err'); }
};
</script>

<div id="pwa">
  <img src="./web-app-manifest-192x192.png" alt="">
  <div style="flex:1"><div style="font-weight:800;font-size:13px">Install Meetwoyou</div><div style="font-size:11px;color:#94a3b8">Add to home screen</div></div>
  <button id="pwa-btn">Install</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  addEventListener('load', () => navigator.serviceWorker.register('./sw.js').then(r => r.update()).catch(()=>{}));
}
let deferred;
addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferred = e;
  setTimeout(()=>{ document.getElementById('pwa').style.display='flex'; }, 1500);
});
document.getElementById('pwa-btn').onclick = async () => {
  document.getElementById('pwa').style.display='none';
  if (deferred) { deferred.prompt(); deferred = null; }
};
</script>
<script type="module" src="./mw-upgrades.js"></script>
<script type="module" src="./mw-final.js"></script>
</body>
</html>
